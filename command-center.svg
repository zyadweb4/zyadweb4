<svg viewBox="0 0 900 420" xmlns="http://www.w3.org/2000/svg" font-family="'Fira Code', monospace">
  <defs>
    <radialGradient id="cc-bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#10314f"/>
      <stop offset="60%" stop-color="#0c1d30"/>
      <stop offset="100%" stop-color="#081018"/>
    </radialGradient>
    <radialGradient id="globe" cx="38%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#4FC3F7"/>
      <stop offset="55%" stop-color="#1c78ad"/>
      <stop offset="100%" stop-color="#0a3552"/>
    </radialGradient>
    <linearGradient id="radar-sweep" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#29B6F6" stop-opacity="0"/>
      <stop offset="100%" stop-color="#29B6F6" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="scanline" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#29B6F6" stop-opacity="0"/>
      <stop offset="50%" stop-color="#29B6F6" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#29B6F6" stop-opacity="0"/>
    </linearGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="globeClip"><circle cx="0" cy="0" r="110"/></clipPath>
    <clipPath id="panel"><rect x="0" y="0" width="900" height="420" rx="20"/></clipPath>
  </defs>

  <g clip-path="url(#panel)">
    <rect width="900" height="420" fill="url(#cc-bg)"/>

    <!-- faint grid -->
    <g stroke="#123c5c" stroke-width="1" opacity="0.4">
      <line x1="0" y1="70" x2="900" y2="70"/>
      <line x1="0" y1="140" x2="900" y2="140"/>
      <line x1="0" y1="210" x2="900" y2="210"/>
      <line x1="0" y1="280" x2="900" y2="280"/>
      <line x1="0" y1="350" x2="900" y2="350"/>
      <line x1="150" y1="0" x2="150" y2="420"/>
      <line x1="300" y1="0" x2="300" y2="420"/>
      <line x1="450" y1="0" x2="450" y2="420"/>
      <line x1="600" y1="0" x2="600" y2="420"/>
      <line x1="750" y1="0" x2="750" y2="420"/>
    </g>

    <!-- drifting vertical scan -->
    <rect x="-120" y="0" width="120" height="420" fill="url(#scanline)">
      <animate attributeName="x" from="-120" to="900" dur="5s" repeatCount="indefinite"/>
    </rect>

    <!-- ===== HEADER ===== -->
    <text x="34" y="44" fill="#29B6F6" font-size="20" font-weight="800" letter-spacing="3">◢ GIS COMMAND CENTER</text>
    <text x="34" y="64" fill="#6fa8c9" font-size="11" letter-spacing="2">ZEYAD MOHAMED ABDELFATTAH · SPATIAL OPS</text>
    <g>
      <circle cx="862" cy="40" r="6" fill="#29B6F6"><animate attributeName="opacity" values="1;0.2;1" dur="1.4s" repeatCount="indefinite"/></circle>
      <text x="850" y="44" text-anchor="end" fill="#8fd0f0" font-size="11" letter-spacing="2">LIVE</text>
    </g>

    <!-- ===== LEFT: ROTATING GLOBE + RADAR ===== -->
    <g transform="translate(180,240)">
      <!-- radar rings -->
      <g fill="none" stroke="#1d5478" stroke-width="1">
        <circle r="150" opacity="0.35"/>
        <circle r="110"/>
        <circle r="72"/>
        <circle r="36"/>
      </g>
      <!-- rotating sweep -->
      <g>
        <path d="M0,0 L150,0 A150,150 0 0,1 106,106 Z" fill="url(#radar-sweep)" opacity="0.5"/>
        <line x1="0" y1="0" x2="150" y2="0" stroke="#29B6F6" stroke-width="2"/>
        <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="4s" repeatCount="indefinite"/>
      </g>

      <!-- globe -->
      <circle r="110" fill="url(#globe)" filter="url(#soft)"/>
      <g clip-path="url(#globeClip)" opacity="0.9">
        <!-- longitude meridians that scroll to fake rotation -->
        <g stroke="#bfe8ff" stroke-width="1" fill="none" opacity="0.5">
          <g>
            <ellipse cx="0" cy="0" rx="30" ry="110"/>
            <ellipse cx="0" cy="0" rx="62" ry="110"/>
            <ellipse cx="0" cy="0" rx="92" ry="110"/>
            <animateTransform attributeName="transform" type="translate" from="-30 0" to="30 0" dur="3s" repeatCount="indefinite" additive="sum"/>
          </g>
        </g>
        <!-- latitude lines -->
        <g stroke="#bfe8ff" stroke-width="1" fill="none" opacity="0.35">
          <line x1="-110" y1="-55" x2="110" y2="-55"/>
          <line x1="-110" y1="0" x2="110" y2="0"/>
          <line x1="-110" y1="55" x2="110" y2="55"/>
        </g>
        <!-- abstract "continents" drifting -->
        <g opacity="0.55">
          <g fill="#0e4368">
            <path d="M-70,-40 q20,-18 45,-6 q18,10 6,30 q-16,20 -44,10 q-24,-10 -7,-34 Z"/>
            <path d="M20,10 q26,-8 40,12 q10,22 -14,32 q-30,10 -40,-14 q-8,-26 14,-30 Z"/>
            <path d="M-30,55 q18,-6 30,8 q6,16 -12,22 q-22,4 -26,-12 q-4,-14 8,-18 Z"/>
            <animateTransform attributeName="transform" type="translate" from="0 0" to="60 0" dur="6s" repeatCount="indefinite"/>
          </g>
        </g>
      </g>
      <circle r="110" fill="none" stroke="#4FC3F7" stroke-width="1.5" opacity="0.7"/>

      <!-- pinging target blips -->
      <g fill="#7CF">
        <circle cx="55" cy="-40" r="3"><animate attributeName="r" values="2;9;2" dur="2.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0;1" dur="2.2s" repeatCount="indefinite"/></circle>
        <circle cx="-60" cy="30" r="3"><animate attributeName="r" values="2;9;2" dur="2.2s" begin="0.9s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0;1" dur="2.2s" begin="0.9s" repeatCount="indefinite"/></circle>
        <circle cx="20" cy="70" r="3"><animate attributeName="r" values="2;9;2" dur="2.2s" begin="1.5s" repeatCount="indefinite"/><animate attributeName="opacity" values="1;0;1" dur="2.2s" begin="1.5s" repeatCount="indefinite"/></circle>
      </g>
    </g>

    <!-- ===== RIGHT: LIVE TELEMETRY PANEL ===== -->
    <g transform="translate(430,95)">
      <rect x="0" y="0" width="440" height="290" rx="14" fill="#0c2237" stroke="#1d5478" stroke-width="1.5"/>
      <text x="20" y="30" fill="#29B6F6" font-size="13" font-weight="700" letter-spacing="2">LAYER STACK · BUILDING…</text>

      <!-- animated layer bars -->
      <g font-size="11" fill="#cfe9fa">
        <!-- ArcGIS -->
        <text x="20" y="66">ArcGIS Pro</text>
        <rect x="150" y="55" width="270" height="12" rx="6" fill="#10314f"/>
        <rect x="150" y="55" width="0" height="12" rx="6" fill="#29B6F6">
          <animate attributeName="width" from="0" to="256" dur="1.3s" begin="0.1s" fill="freeze" calcMode="spline" keySplines="0.2 1 0.3 1"/>
        </rect>
        <!-- Civil 3D -->
        <text x="20" y="96">Civil 3D</text>
        <rect x="150" y="85" width="270" height="12" rx="6" fill="#10314f"/>
        <rect x="150" y="85" width="0" height="12" rx="6" fill="#29B6F6">
          <animate attributeName="width" from="0" to="230" dur="1.3s" begin="0.3s" fill="freeze" calcMode="spline" keySplines="0.2 1 0.3 1"/>
        </rect>
        <!-- AutoCAD -->
        <text x="20" y="126">AutoCAD</text>
        <rect x="150" y="115" width="270" height="12" rx="6" fill="#10314f"/>
        <rect x="150" y="115" width="0" height="12" rx="6" fill="#29B6F6">
          <animate attributeName="width" from="0" to="243" dur="1.3s" begin="0.5s" fill="freeze" calcMode="spline" keySplines="0.2 1 0.3 1"/>
        </rect>
        <!-- Web Dev -->
        <text x="20" y="156">Web Dev</text>
        <rect x="150" y="145" width="270" height="12" rx="6" fill="#10314f"/>
        <rect x="150" y="145" width="0" height="12" rx="6" fill="#00A9E0">
          <animate attributeName="width" from="0" to="243" dur="1.3s" begin="0.7s" fill="freeze" calcMode="spline" keySplines="0.2 1 0.3 1"/>
        </rect>
        <!-- WordPress -->
        <text x="20" y="186">WordPress</text>
        <rect x="150" y="175" width="270" height="12" rx="6" fill="#10314f"/>
        <rect x="150" y="175" width="0" height="12" rx="6" fill="#00A9E0">
          <animate attributeName="width" from="0" to="243" dur="1.3s" begin="0.9s" fill="freeze" calcMode="spline" keySplines="0.2 1 0.3 1"/>
        </rect>
        <!-- Flutter -->
        <text x="20" y="216">Flutter</text>
        <rect x="150" y="205" width="270" height="12" rx="6" fill="#10314f"/>
        <rect x="150" y="205" width="0" height="12" rx="6" fill="#4FC3F7">
          <animate attributeName="width" from="0" to="216" dur="1.3s" begin="1.1s" fill="freeze" calcMode="spline" keySplines="0.2 1 0.3 1"/>
        </rect>
      </g>

      <!-- live coordinate readout -->
      <g transform="translate(20,244)">
        <rect x="0" y="0" width="400" height="30" rx="8" fill="#08283f" stroke="#1d5478" stroke-width="1"/>
        <text x="12" y="20" fill="#6fd0ff" font-size="11" letter-spacing="1">LAT</text>
        <text x="46" y="20" fill="#dff2ff" font-size="11">31.03°N</text>
        <text x="140" y="20" fill="#6fd0ff" font-size="11" letter-spacing="1">LON</text>
        <text x="176" y="20" fill="#dff2ff" font-size="11">30.47°E</text>
        <text x="280" y="20" fill="#6fd0ff" font-size="11" letter-spacing="1">FIX</text>
        <text x="312" y="20" fill="#7CFFB0" font-size="11">LOCKED</text>
        <circle cx="392" cy="15" r="4" fill="#7CFFB0"><animate attributeName="opacity" values="1;0.15;1" dur="1s" repeatCount="indefinite"/></circle>
      </g>
    </g>

    <!-- ticker at bottom -->
    <g transform="translate(0,404)">
      <rect x="0" y="-16" width="900" height="20" fill="#08243a"/>
      <text y="-2" fill="#4a90b8" font-size="10" letter-spacing="1">
        ▹ SURVEY IMPORTED  ▹ TERRAIN ANALYZED  ▹ NETWORK ROUTED  ▹ QUANTITIES CALCULATED  ▹ 3D MODEL RENDERED  ▹ MAP PUBLISHED
        <animate attributeName="x" from="900" to="-560" dur="12s" repeatCount="indefinite"/>
      </text>
    </g>
  </g>

  <rect x="1" y="1" width="898" height="418" rx="20" fill="none" stroke="#29B6F6" stroke-width="1.5" opacity="0.5"/>
</svg>
