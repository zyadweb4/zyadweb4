<svg viewBox="0 0 820 150" xmlns="http://www.w3.org/2000/svg" font-family="'Fira Code', monospace">
  <defs>
    <linearGradient id="barBg" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0d1b2a"/>
      <stop offset="50%" stop-color="#12314d"/>
      <stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <filter id="ig" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="820" height="150" rx="16" fill="url(#barBg)"/>
  <text x="410" y="30" text-anchor="middle" fill="#29B6F6" font-size="15" font-weight="800" letter-spacing="3">TOOLS &amp; LANGUAGES</text>

  <!-- moving scan line -->
  <rect x="0" y="45" width="90" height="80" fill="#29B6F6" opacity="0.08">
    <animate attributeName="x" from="-90" to="820" dur="3.2s" repeatCount="indefinite"/>
  </rect>

  <!-- each chip: rounded rect + label, staggered fade/pulse -->
  <g font-size="12" font-weight="700" text-anchor="middle">

    <!-- row 1 -->
    <g filter="url(#ig)">
      <g><rect x="30"  y="55" width="118" height="34" rx="8" fill="#152f49" stroke="#29B6F6" stroke-width="1.5"/>
         <text x="89"  y="77" fill="#dbeefb">ArcGIS Pro</text>
         <animate attributeName="opacity" values="0.45;1;0.45" dur="3s" begin="0s" repeatCount="indefinite"/></g>
      <g><rect x="158" y="55" width="104" height="34" rx="8" fill="#152f49" stroke="#29B6F6" stroke-width="1.5"/>
         <text x="210" y="77" fill="#dbeefb">Civil 3D</text>
         <animate attributeName="opacity" values="0.45;1;0.45" dur="3s" begin="0.25s" repeatCount="indefinite"/></g>
      <g><rect x="272" y="55" width="104" height="34" rx="8" fill="#152f49" stroke="#29B6F6" stroke-width="1.5"/>
         <text x="324" y="77" fill="#dbeefb">AutoCAD</text>
         <animate attributeName="opacity" values="0.45;1;0.45" dur="3s" begin="0.5s" repeatCount="indefinite"/></g>
      <g><rect x="386" y="55" width="118" height="34" rx="8" fill="#152f49" stroke="#29B6F6" stroke-width="1.5"/>
         <text x="445" y="77" fill="#dbeefb">InfraWorks</text>
         <animate attributeName="opacity" values="0.45;1;0.45" dur="3s" begin="0.75s" repeatCount="indefinite"/></g>
      <g><rect x="514" y="55" width="110" height="34" rx="8" fill="#152f49" stroke="#29B6F6" stroke-width="1.5"/>
         <text x="569" y="77" fill="#dbeefb">JavaScript</text>
         <animate attributeName="opacity" values="0.45;1;0.45" dur="3s" begin="1s" repeatCount="indefinite"/></g>
      <g><rect x="634" y="55" width="80" height="34" rx="8" fill="#152f49" stroke="#29B6F6" stroke-width="1.5"/>
         <text x="674" y="77" fill="#dbeefb">PHP</text>
         <animate attributeName="opacity" values="0.45;1;0.45" dur="3s" begin="1.25s" repeatCount="indefinite"/></g>
      <g><rect x="724" y="55" width="66" height="34" rx="8" fill="#152f49" stroke="#29B6F6" stroke-width="1.5"/>
         <text x="757" y="77" fill="#dbeefb">JS</text>
         <animate attributeName="opacity" values="0.45;1;0.45" dur="3s" begin="1.5s" repeatCount="indefinite"/></g>
    </g>

    <!-- row 2 -->
    <g filter="url(#ig)">
      <g><rect x="70"  y="100" width="118" height="34" rx="8" fill="#152f49" stroke="#00A9E0" stroke-width="1.5"/>
         <text x="129" y="122" fill="#dbeefb">WordPress</text>
         <animate attributeName="opacity" values="0.45;1;0.45" dur="3s" begin="0.6s" repeatCount="indefinite"/></g>
      <g><rect x="198" y="100" width="96" height="34" rx="8" fill="#152f49" stroke="#00A9E0" stroke-width="1.5"/>
         <text x="246" y="122" fill="#dbeefb">Laravel</text>
         <animate attributeName="opacity" values="0.45;1;0.45" dur="3s" begin="0.85s" repeatCount="indefinite"/></g>
      <g><rect x="304" y="100" width="90" height="34" rx="8" fill="#152f49" stroke="#00A9E0" stroke-width="1.5"/>
         <text x="349" y="122" fill="#dbeefb">Flutter</text>
         <animate attributeName="opacity" values="0.45;1;0.45" dur="3s" begin="1.1s" repeatCount="indefinite"/></g>
      <g><rect x="404" y="100" width="96" height="34" rx="8" fill="#152f49" stroke="#00A9E0" stroke-width="1.5"/>
         <text x="452" y="122" fill="#dbeefb">Android</text>
         <animate attributeName="opacity" values="0.45;1;0.45" dur="3s" begin="1.35s" repeatCount="indefinite"/></g>
      <g><rect x="510" y="100" width="84" height="34" rx="8" fill="#152f49" stroke="#00A9E0" stroke-width="1.5"/>
         <text x="552" y="122" fill="#dbeefb">React</text>
         <animate attributeName="opacity" values="0.45;1;0.45" dur="3s" begin="1.6s" repeatCount="indefinite"/></g>
      <g><rect x="604" y="100" width="120" height="34" rx="8" fill="#152f49" stroke="#00A9E0" stroke-width="1.5"/>
         <text x="664" y="122" fill="#dbeefb">HTML / CSS</text>
         <animate attributeName="opacity" values="0.45;1;0.45" dur="3s" begin="1.85s" repeatCount="indefinite"/></g>
    </g>
  </g>
</svg>
